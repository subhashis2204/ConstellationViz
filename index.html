<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>three-learning</title>
  </head>
  <body
    class="overflow-hidden bg-gradient-to-b from-[#0c102b] to-[#04040c] min-h-screen"
  >
    <div id="app"></div>

    <div
      class="bg-white/25 border border-white/15 text-white absolute top-0 left-0 m-5 p-5 rounded-md flex flex-col gap-4"
    >
      <div class="flex flex-col gap-1">
        <p class="text-sm font-semibold tracking-widest text-center">
          CONSTELLATIONVIZ
        </p>
        <p class="text-xs tracking-wide text-center text-gray-300">
          Interactive Globe Viewer
        </p>
      </div>
      <button
        id="stop-motion"
        class="w-full flex items-center justify-center gap-2 bg-white text-slate-950 font-medium text-sm py-2.5 px-4 rounded-md transition-all duration-100 hover:bg-slate-800 hover:text-white shadow-sm cursor-pointer"
      >
        <span id="buttonIcon" class="w-3 h-3 flex items-center justify-center">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="w-4 h-4"
          >
            <path
              fill-rule="evenodd"
              d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z"
              clip-rule="evenodd"
            />
          </svg>
        </span>

        <span id="buttonText">Start Motion</span>
      </button>

      <button
        id="reset"
        class="w-full flex items-center justify-center gap-2 bg-white text-slate-950 font-medium text-sm py-2.5 px-4 rounded-md transition-all duration-100 hover:bg-slate-800 hover:text-white shadow-sm cursor-pointer"
      >
        <span id="buttonIcon" class="w-3 h-3 flex items-center justify-center">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="w-4 h-4"
          >
            <path
              fill-rule="evenodd"
              d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z"
              clip-rule="evenodd"
            />
          </svg>
        </span>

        <span>Reset Globe</span>
      </button>
    </div>

    <canvas id="Canvas" class="block w-full h-screen"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
