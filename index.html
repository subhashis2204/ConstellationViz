<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>three-learning</title>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body
    class="overflow-hidden bg-gradient-to-b from-[#0c102b] to-[#04040c] min-h-screen font-sans"
  >
    <div id="app"></div>

    <div
      class="bg-slate-950/40 backdrop-blur-md border border-white/30 text-white absolute top-0 left-0 m-5 p-6 rounded-xl flex flex-col gap-6 w-68 shadow-2xl z-10"
    >
      <div class="flex flex-col gap-1.5">
        <p
          class="text-sm font-semibold tracking-[0.18em] text-center text-white/90"
        >
          CONSTELLATIONVIZ
        </p>
        <p class="text-xs tracking-wider text-center text-gray-400">
          Interactive Globe Viewer
        </p>
      </div>

      <button
        id="stop-motion"
        class="w-full flex items-center justify-center gap-2 bg-white text-slate-950 font-semibold text-md py-2.5 px-4 rounded-lg transition-all duration-200 hover:bg-slate-100 shadow-lg cursor-pointer"
      >
        <span id="buttonIcon" class="w-3 h-3 flex items-center justify-center">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="w-4 h-4 font-bold"
          >
            <path
              fill-rule="evenodd"
              d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z"
              clip-rule="evenodd"
            />
          </svg>
        </span>
        <span id="buttonText">Start Motion</span>
      </button>

      <div class="flex flex-col gap-2.5 slider py-1 hidden">
        <div class="flex justify-between items-center px-1">
          <span class="text-xs uppercase tracking-widest text-gray-400"
            >Simulation Speed</span
          >
          <span class="text-sm font-bold text-yellow-400 sim-speed">x 1.0</span>
        </div>
        <input
          id="speed-slider"
          type="range"
          min="1"
          max="5"
          step="0.25"
          value="1"
          class="w-full h-1.5 bg-white/10 rounded-full appearance-none cursor-pointer accent-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/50"
        />
      </div>

      <button
        id="reset"
        class="w-full flex items-center justify-center gap-2 border border-white/20 bg-white/5 text-white font-medium text-sm py-2.5 px-4 rounded-lg transition-all duration-200 hover:bg-white/10 hover:border-white/60 border-white/30 shadow-sm cursor-pointer tracking-wide"
      >
        <span>Reset Camera</span>
      </button>
    </div>

    <canvas id="Canvas" class="block w-full h-screen"></canvas>
    <script type="module" src="/src/init.js"></script>
  </body>
</html>
